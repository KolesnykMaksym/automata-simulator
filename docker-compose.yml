services:
  # Headless CLI — mount a host directory at /work and invoke
  #   docker compose run --rm automata <subcommand> [args]
  automata:
    build:
      context: .
      dockerfile: Dockerfile
    image: automata-simulator:latest
    volumes:
      - ./examples:/work:ro
    working_dir: /work

  # Live-reload dev environment with the source mounted in place.
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: automata-simulator:latest
    entrypoint: ["/bin/bash"]
    volumes:
      - .:/src
    working_dir: /src
    environment:
      PYTHONPATH: /src
