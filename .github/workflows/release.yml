name: Release

on:
  workflow_dispatch:  # only runs when explicitly invoked
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build distributions
        run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # PyPI publish runs only when the `pypi` environment is configured
  # (trusted publishing via OIDC). Until then, disable with
  # `gh variable set PYPI_PUBLISH_ENABLED --body "false"` — already the
  # default state so the first release won't fail loudly on a fresh clone.
  publish:
    name: Publish to PyPI (OIDC)
    needs: build
    if: ${{ vars.PYPI_PUBLISH_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/automata-simulator
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
